services:

  # ==========================================
  # Frontend — React + Vite 개발 서버
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    networks:
      - forge_net
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # Backend — PHP 8.4-FPM + Laravel 13
  # ==========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
      - ${FORGE_PROJECT_ROOT:-.}:/mnt/project:rw
    env_file:
      - ./backend/.env
    networks:
      - forge_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    depends_on:
      db:
        condition: service_healthy

  # ==========================================
  # Database — PostgreSQL 18
  # ==========================================
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: claude_forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - forge_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d claude_forge"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 5

  # ==========================================
  # Nginx — 리버스 프록시
  # ==========================================
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "8000:80"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www/html:ro
    networks:
      - forge_net
    restart: unless-stopped
    depends_on:
      - frontend
      - backend

# ==========================================
# Named Volumes
# ==========================================
volumes:
  postgres_data:
    driver: local
  frontend_node_modules:
    driver: local
  backend_vendor:
    driver: local

# ==========================================
# Networks
# ==========================================
networks:
  forge_net:
    driver: bridge
